name: link-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .github/lychee.toml
            --verbose
            --no-progress
            './**/*.md'
          fail: true

      - name: Create issue if dead links found on cron
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Weekly link-check found dead links'
          content-filepath: ./lychee/out.md
          labels: link-rot, automation
